        if (e.key==='4') activatePowerup('magnet');
    });

    let touchStartX = 0, touchHandled = false;
    gameCanvas.addEventListener('touchstart', e => {
        if (state !== 'playing') return;
        e.preventDefault();
        getAudioCtx(); 
        touchStartX = e.touches[0].clientX;
        touchHandled = false;
    }, { passive: false });
    gameCanvas.addEventListener('touchmove', e => {
        if (state !== 'playing' || touchHandled) return;
        e.preventDefault();
        const dx = e.touches[0].clientX - touchStartX;
        if (Math.abs(dx) > 25) { dx < 0 ? mvLeft() : mvRight(); touchHandled = true; }
    }, { passive: false });
    gameCanvas.addEventListener('touchend', e => {
        if (state !== 'playing' || touchHandled) return;
        e.preventDefault();
        const r = gameCanvas.getBoundingClientRect();
        touchStartX - r.left < r.width/2 ? mvLeft() : mvRight();
    }, { passive: false });
    gameCanvas.addEventListener('mousedown', e => {
        if (state !== 'playing') return;
        getAudioCtx();
        const r = gameCanvas.getBoundingClientRect();
        const x = e.clientX - r.left;
        x < r.width/2 ? mvLeft() : mvRight();
    });

    // ========== SPEED LINES ==========
    function updateSpeedLines(dt) {
        if (!lvlCfg) return;
        const mult = getSpeedMultiplier();
        if (Math.random() < (0.3 + curLevel * 0.005) * mult) {
            const side = Math.random() > 0.5 ? 1 : -1;
            speedLines.push({
                x: VP_X + side * (Math.random() * CW * 0.4 + 20),
                y: VP_Y + Math.random() * 30,
                len: 0, maxLen: Math.random() * 60 + 30,
                spd: Math.random() * 3 + 2, a: Math.random() * 0.3 + 0.1,
                dx: side * (Math.random() * 1.5 + 0.5),
            });
        }
        const d = dt / 16.67 * mult;
        for (let i = speedLines.length - 1; i >= 0; i--) {
            const l = speedLines[i];
            l.y += l.spd * d * 4; l.x += l.dx * d * 2;
            l.len = Math.min(l.len + l.spd * d * 2, l.maxLen);
            l.a -= 0.006 * d;
            if (l.a <= 0 || l.y > CH) speedLines.splice(i, 1);
        }
    }
    function drawSpeedLines() {
        for (const l of speedLines) {
            ctx.strokeStyle = themeColor;
            ctx.globalAlpha = l.a;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(l.x, l.y);
            ctx.lineTo(l.x + l.dx * l.len * 0.3, l.y + l.len);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }

    // ========== MAIN LOOP ==========
    function loop(ts) {
        requestAnimationFrame(loop);
        updateBg();
        drawBg();

        if (state === 'playing') {
            const dt = Math.min(ts - lastTS, 50);
            lastTS = ts;

            if (introTimer > 0) {
                introTimer -= dt;
                introAlpha = Math.min(1, introTimer / 600);
            }

            if (introTimer <= 0) {
                const mult = getSpeedMultiplier();
                elapsed += (dt / 1000) * (activePU.speed ? 2 : activePU.slow ? 0.5 : 1);
                if (elapsed >= lvlDur) { doComplete(); return; }
            }

            const mult = getSpeedMultiplier();
            scrollOff += lvlCfg.spd * (dt/16.67) * 0.45 * mult;
            if (scrollOff > 1) scrollOff -= 1;

            updatePlayer(dt);
            if (introTimer <= 0) {
                updateObs(dt);
                updateCoins3d(dt);
                checkCol();
            }
            updatePowerups(dt);
            updateExplosion(dt);
            updateSpeedLines(dt);

            if (shakeMag > 0) shakeMag *= 0.9;
            if (flashA > 0)   flashA   *= 0.92;

            const sx = (Math.random()-0.5)*shakeMag;
            const sy = (Math.random()-0.5)*shakeMag;
            ctx.save();
            ctx.translate(sx, sy);
            ctx.clearRect(-20,-20,CW+40,CH+40);

            drawTunnel();
            drawSpeedLines();
            drawCoins3d();
            drawObs();
            drawPlayer();
            drawExplosion();

            const vig = ctx.createRadialGradient(VP_X, CH*0.45, CH*0.2, VP_X, CH*0.45, CH*0.65);
            vig.addColorStop(0, 'transparent');
            vig.addColorStop(1, 'rgba(0,0,0,0.45)');
            ctx.fillStyle = vig;
            ctx.fillRect(0, 0, CW, CH);

            if (flashA > 0.01) {
                const fc = activePU.shield && flashA < 0.5 ? 'rgba(255,255,255,' : 'rgba(255,0,50,';
                ctx.fillStyle = fc + flashA + ')';
                ctx.fillRect(-20,-20,CW+40,CH+40);
            }

            if (introAlpha > 0.01) {
                ctx.fillStyle = `rgba(5,5,16,${introAlpha*0.85})`;
                ctx.fillRect(0,0,CW,CH);
                ctx.textAlign = 'center';
                ctx.globalAlpha = introAlpha;
                ctx.font = 'bold 28px "Courier New"';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = themeColor;
                ctx.shadowBlur = 20;
                ctx.fillText('LEVEL ' + curLevel, VP_X, CH*0.40);
                ctx.font = '14px "Courier New"';
                ctx.fillStyle = themeColor;
                ctx.shadowBlur = 10;
                ctx.fillText(getZone(curLevel), VP_X, CH*0.44);
                ctx.font = '11px "Courier New"';
                ctx.fillStyle = '#888';
                ctx.shadowBlur = 0;
                ctx.fillText('Survive ' + lvlDur.toFixed(0) + ' seconds', VP_X, CH*0.48);
                ctx.globalAlpha = 1;
                ctx.textAlign = 'start';
                ctx.shadowBlur = 0;
            }

            ctx.restore();

            const rem = Math.max(0, lvlDur - elapsed);
            timerDisplay.textContent = rem.toFixed(1);
            timerBar.style.width = (elapsed/lvlDur*100) + '%';

        } else if (state === 'gameover') {
            const dt = Math.min(ts - lastTS, 50);
            lastTS = ts;
            if (shakeMag > 0) shakeMag *= 0.96;
            if (flashA > 0) flashA *= 0.96;
            updateExplosion(dt);

            const sx = (Math.random()-0.5)*shakeMag;
            const sy = (Math.random()-0.5)*shakeMag;
            ctx.save();
            ctx.translate(sx, sy);
            ctx.clearRect(-20,-20,CW+40,CH+40);
            drawTunnel(); drawObs(); drawPlayer(); drawExplosion();
            if (flashA>0.01) {
                ctx.fillStyle = `rgba(255,0,50,${flashA})`;
                ctx.fillRect(-20,-20,CW+40,CH+40);
            }
            ctx.restore();

        } else if (state === 'paused') {
            ctx.clearRect(0,0,CW,CH);
            drawTunnel(); drawObs(); drawPlayer();

        } else {
            ctx.clearRect(0,0,CW,CH);
            menuScrollOff += 0.002;
            if (menuScrollOff > 1) menuScrollOff -= 1;
            const savedScroll = scrollOff;
            scrollOff = menuScrollOff;
            ctx.globalAlpha = 0.3;
            drawTunnel();
            ctx.globalAlpha = 1;
            scrollOff = savedScroll;
        }
    }

    // ============================================================
    // INTRO ANIMATION LOGIC
    // ============================================================
    function runIntro() {
        const introScreen = document.getElementById('intro-screen');
        const artivoContainer = document.getElementById('artivo-container');
        const gameSubtitle = document.getElementById('game-subtitle');
        const loadbar = document.getElementById('loadbar');
        const loadText = document.getElementById('load-percentage');
        
        const lettersArr = ['A','R','T','I','V','O'];
        const start = [
            [-200,-150,-15],
            [200,-100,10],
            [-150,150,20],
            [180,120,-10],
            [-250,0,15],
            [250,-50,-20]
        ];

        lettersArr.forEach((l,i)=>{
            const span = document.createElement("span");
            span.innerText = l;
            span.style.setProperty("--start-x", start[i][0]+"px");
            span.style.setProperty("--start-y", start[i][1]+"px");
            span.style.setProperty("--start-rot", start[i][2]+"deg");
            span.style.animation = "letterAssemble 1.2s cubic-bezier(0.34,1.56,0.64,1) "+(i*0.1)+"s forwards";
            span.style.opacity = "0";
            artivoContainer.appendChild(span);
        });

        setTimeout(() => {
            gameSubtitle.style.transition = "opacity 0.8s ease";
            gameSubtitle.style.opacity = "1";
        }, 1800);

        let load = 0;
        setTimeout(() => {
            const loadInterval = setInterval(() => {
                load += 1; 
                loadbar.style.width = load + "%";
                loadText.innerText = load + "%";

                if (load >= 100) {
                    clearInterval(loadInterval);
                    
                    introScreen.style.opacity = "0";
                    introScreen.style.transform = "scale(1.1)";
                    introScreen.style.pointerEvents = "none"; 

                    setTimeout(() => {
                        introScreen.remove();
                        // Start menu music after intro finishes
                        startMenuMusic();
                        currentMusicMode = 'menu';
                    }, 800);
                }
            }, 50); 
        }, 2000); 
    }

    // ============================================================
    // INIT
    // ============================================================
    function init() {
        load();
        loadChallenges();
        resize();
        initBg();
        document.documentElement.style.setProperty('--theme', themeColor);
        bgCtx.fillStyle = '#050510';
        bgCtx.fillRect(0,0,CW,CH);
        
        showMenu();
        
        runIntro();
        
        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 150));
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

    document.addEventListener('click', () => { try { getAudioCtx(); } catch(e){} }, { once: true });
    document.addEventListener('touchstart', () => { try { getAudioCtx(); } catch(e){} }, { once: true });

    init();
    </script>
</body>
</html>
